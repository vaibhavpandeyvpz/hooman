<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sign in</title>
    <style>
      :root {
        --bg: #f7f5f2;
        --ink: #1a1a1a;
        --muted: #5c5c5c;
        --accent: #0f6b6b;
        --surface: #ffffff;
        --border: #e8e4dc;
        --danger: #b42318;
        --font-body: system-ui, -apple-system, sans-serif;
        --space-3: 0.75rem;
        --space-4: 1rem;
        --space-5: 1.5rem;
        --space-6: 2rem;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: var(--font-body);
        background: var(--bg);
        color: var(--ink);
        line-height: 1.5;
        padding: var(--space-5);
      }
      .card {
        width: min(100%, 24rem);
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 0.375rem;
        padding: var(--space-6);
      }
      h1 {
        margin: 0 0 0.25rem;
        font-size: 1.375rem;
        letter-spacing: -0.02em;
      }
      .lede {
        margin: 0 0 var(--space-5);
        color: var(--muted);
        font-size: 0.9375rem;
      }
      form {
        display: flex;
        flex-direction: column;
        gap: var(--space-4);
      }
      label {
        display: flex;
        flex-direction: column;
        gap: 0.35rem;
        font-size: 0.8125rem;
        font-weight: 600;
      }
      input {
        font: inherit;
        padding: 0.6rem 0.75rem;
        border: 1px solid var(--border);
        border-radius: 0.375rem;
        background: #fff;
        color: var(--ink);
      }
      input:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 1px;
      }
      .error {
        color: var(--danger);
        font-size: 0.8125rem;
        font-weight: 400;
      }
      .btn {
        margin-top: var(--space-3);
        padding: 0.7rem 1rem;
        border: 0;
        border-radius: 0.375rem;
        background: var(--accent);
        color: #fff;
        font: inherit;
        font-weight: 600;
        cursor: pointer;
      }
      .btn:focus-visible {
        outline: 2px solid var(--ink);
        outline-offset: 2px;
      }
      .btn:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }
      .meta {
        margin-top: var(--space-5);
        font-size: 0.875rem;
        color: var(--muted);
        text-align: center;
      }
      .meta a {
        color: var(--accent);
      }
      /* Show empty / error / pending by toggling [hidden] in prototypes */
      [hidden] {
        display: none !important;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Sign in</h1>
      <p class="lede">Use your work email.</p>
      <form>
        <label>
          Email
          <input type="email" name="email" autocomplete="username" required />
          <span class="error" hidden>Enter a valid email.</span>
        </label>
        <label>
          Password
          <input
            type="password"
            name="password"
            autocomplete="current-password"
            required
          />
          <span class="error" hidden>Password is required.</span>
        </label>
        <button class="btn" type="submit">Continue</button>
      </form>
      <p class="meta">
        <a href="#">Forgot password?</a> · <a href="#">Create account</a>
      </p>
    </main>
  </body>
</html>
