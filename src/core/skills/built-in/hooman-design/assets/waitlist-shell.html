<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Waitlist</title>
    <style>
      :root {
        --bg: #f8fafc;
        --ink: #0f172a;
        --muted: #64748b;
        --accent: #0f766e;
        --surface: #ffffff;
        --border: #e2e8f0;
        --danger: #b91c1c;
        --font-display: system-ui, -apple-system, sans-serif;
        --font-body: system-ui, -apple-system, sans-serif;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: var(--font-body);
        background: var(--bg);
        color: var(--ink);
        padding: 1.5rem;
      }
      .card {
        width: min(100%, 26rem);
        text-align: center;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 0.375rem;
        padding: 2rem 1.5rem;
      }
      .kicker {
        margin: 0 0 0.75rem;
        font-size: 0.75rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--accent);
        font-weight: 600;
      }
      h1 {
        font-family: var(--font-display);
        font-size: clamp(1.5rem, 3vw, 1.85rem);
        letter-spacing: -0.02em;
        margin: 0 0 0.5rem;
        line-height: 1.2;
      }
      .lede {
        margin: 0 0 1.5rem;
        color: var(--muted);
        font-size: 0.9375rem;
        line-height: 1.5;
      }
      form {
        display: flex;
        flex-direction: column;
        gap: 0.65rem;
        text-align: left;
      }
      label {
        display: flex;
        flex-direction: column;
        gap: 0.35rem;
        font-size: 0.8125rem;
        font-weight: 600;
      }
      input {
        font: inherit;
        padding: 0.65rem 0.75rem;
        border: 1px solid var(--border);
        border-radius: 0.375rem;
      }
      input:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 1px;
      }
      .btn {
        margin-top: 0.25rem;
        padding: 0.7rem 1rem;
        border: 0;
        border-radius: 0.375rem;
        background: var(--accent);
        color: #fff;
        font: inherit;
        font-weight: 600;
        cursor: pointer;
      }
      .btn:focus-visible {
        outline: 2px solid var(--ink);
        outline-offset: 2px;
      }
      .error {
        color: var(--danger);
        font-size: 0.8125rem;
        font-weight: 400;
      }
      .social {
        margin: 1rem 0 0;
        font-size: 0.8125rem;
        color: var(--muted);
      }
      [hidden] {
        display: none !important;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <p class="kicker">Early access</p>
      <h1>Join the waitlist</h1>
      <p class="lede">
        One clear promise for what they get when invited. No fake “spots left”.
      </p>
      <form>
        <label>
          Work email
          <input type="email" name="email" autocomplete="email" required />
          <span class="error" hidden>Enter a valid email.</span>
        </label>
        <label>
          Company
          <span style="font-weight: 400; color: var(--muted)">(optional)</span>
          <input name="company" autocomplete="organization" />
        </label>
        <button class="btn" type="submit">Request invite</button>
      </form>
      <p class="social">
        We’ll email only about access. Replace with real policy.
      </p>
    </main>
  </body>
</html>
