<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Table</title>
    <style>
      :root {
        --bg: #0d1117;
        --surface: #161b22;
        --ink: #e6edf3;
        --muted: #8b949e;
        --accent: #58a6ff;
        --border: #30363d;
        --font-body: system-ui, -apple-system, sans-serif;
        --font-mono: ui-monospace, SFMono-Regular, Menlo, monospace;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: var(--font-body);
        background: var(--bg);
        color: var(--ink);
        font-size: 14px;
        line-height: 1.45;
        padding: 1.25rem;
      }
      h1 {
        margin: 0 0 1rem;
        font-size: 1.15rem;
      }
      .panel {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 0.375rem;
        overflow: auto;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        min-width: 36rem;
      }
      th,
      td {
        text-align: left;
        padding: 0.65rem 0.85rem;
        border-bottom: 1px solid var(--border);
        vertical-align: top;
      }
      th {
        color: var(--muted);
        font-size: 0.75rem;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        font-weight: 600;
      }
      td.mono {
        font-family: var(--font-mono);
        font-size: 0.8125rem;
      }
      tr:last-child td {
        border-bottom: 0;
      }
      .badge {
        display: inline-block;
        padding: 0.15rem 0.45rem;
        border-radius: 999px;
        border: 1px solid var(--border);
        font-size: 0.75rem;
        color: var(--accent);
      }
      caption {
        text-align: left;
        padding: 0.85rem;
        color: var(--muted);
        caption-side: top;
      }
    </style>
  </head>
  <body>
    <h1>Deployments</h1>
    <div class="panel">
      <table>
        <caption>
          Sample rows — replace with real data or label as fixture.
        </caption>
        <thead>
          <tr>
            <th scope="col">Service</th>
            <th scope="col">Version</th>
            <th scope="col">Status</th>
            <th scope="col">Updated</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>api</td>
            <td class="mono">1.4.2</td>
            <td><span class="badge">Healthy</span></td>
            <td class="mono">2026-07-01</td>
          </tr>
          <tr>
            <td>worker</td>
            <td class="mono">1.4.1</td>
            <td><span class="badge">Healthy</span></td>
            <td class="mono">2026-06-28</td>
          </tr>
        </tbody>
      </table>
    </div>
  </body>
</html>
