<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Email</title>
    <style>
      /* Transactional email: table layout, inline-safe patterns, 600px canvas */
      body {
        margin: 0;
        padding: 0;
        background: #f4f4f5;
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
        color: #18181b;
      }
      .outer {
        width: 100%;
        background: #f4f4f5;
        padding: 24px 12px;
      }
      .inner {
        width: 100%;
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        border: 1px solid #e4e4e7;
        border-radius: 6px;
        overflow: hidden;
      }
      .pad {
        padding: 28px 32px;
      }
      .brand {
        font-size: 14px;
        font-weight: 700;
        letter-spacing: -0.02em;
        margin: 0 0 20px;
      }
      h1 {
        font-size: 22px;
        line-height: 1.25;
        letter-spacing: -0.02em;
        margin: 0 0 12px;
      }
      p {
        font-size: 15px;
        line-height: 1.55;
        color: #3f3f46;
        margin: 0 0 16px;
      }
      .btn {
        display: inline-block;
        padding: 12px 18px;
        background: #0f766e;
        color: #ffffff !important;
        text-decoration: none;
        border-radius: 6px;
        font-size: 14px;
        font-weight: 600;
      }
      .foot {
        padding: 16px 32px 24px;
        font-size: 12px;
        line-height: 1.45;
        color: #71717a;
        border-top: 1px solid #e4e4e7;
      }
      .foot a {
        color: #0f766e;
      }
    </style>
  </head>
  <body>
    <div class="outer">
      <div class="inner">
        <div class="pad">
          <p class="brand">Product</p>
          <h1>Action required</h1>
          <p>
            One short reason for this email. Keep the primary action above the
            fold. No fake urgency.
          </p>
          <p><a class="btn" href="#">Primary action</a></p>
          <p>
            If the button fails, paste this URL into your browser:<br />
            <span style="word-break: break-all; color: #71717a"
              >https://example.com/action</span
            >
          </p>
        </div>
        <div class="foot">
          You’re receiving this because of an account action.
          <a href="#">Unsubscribe</a> · <a href="#">Help</a>
        </div>
      </div>
    </div>
  </body>
</html>
