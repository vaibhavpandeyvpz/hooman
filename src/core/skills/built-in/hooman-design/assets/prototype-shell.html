<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Prototype</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Source+Serif+4:opsz,wght@8..60,600;8..60,700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #f7f5f2;
        --ink: #1a1a1a;
        --muted: #5c5c5c;
        --accent: #0f6b6b;
        --surface: #ffffff;
        --font-display:
          "Source Serif 4", Georgia, "Times New Roman", ui-serif, serif;
        --font-body: Inter, system-ui, -apple-system, sans-serif;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: var(--font-body);
        font-size: 16px;
        line-height: 1.55;
        color: var(--ink);
        background: var(--bg);
      }
      header,
      main,
      footer {
        max-width: 72rem;
        margin: 0 auto;
        padding: 1.5rem;
      }
      h1 {
        font-family: var(--font-display);
        font-size: clamp(2rem, 4vw, 3rem);
        line-height: 1.1;
        letter-spacing: -0.02em;
        margin: 0 0 0.75rem;
      }
      .lede {
        color: var(--muted);
        font-size: 1.125rem;
        max-width: 40rem;
      }
      .btn {
        display: inline-block;
        margin-top: 1.25rem;
        padding: 0.65rem 1.1rem;
        border-radius: 0.375rem;
        background: var(--accent);
        color: #fff;
        text-decoration: none;
        letter-spacing: 0.02em;
      }
      .btn:focus-visible {
        outline: 2px solid var(--ink);
        outline-offset: 2px;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Headline that states the offer</h1>
      <p class="lede">
        One short supporting sentence. Replace with real product copy — no
        lorem.
      </p>
      <a class="btn" href="#">Primary action</a>
    </header>
    <main>
      <!-- Add sections with clear hierarchy. Prefer flat surfaces over gradients. -->
    </main>
  </body>
</html>
