<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Empty state</title>
    <style>
      :root {
        --bg: #f8fafc;
        --ink: #0f172a;
        --muted: #64748b;
        --accent: #0f766e;
        --surface: #ffffff;
        --border: #e2e8f0;
        --font-body: system-ui, -apple-system, sans-serif;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: var(--font-body);
        background: var(--bg);
        color: var(--ink);
        padding: 1.5rem;
      }
      .panel {
        width: min(100%, 28rem);
        text-align: center;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 0.375rem;
        padding: 2.5rem 1.75rem;
      }
      .icon {
        width: 2.5rem;
        height: 2.5rem;
        margin: 0 auto 1rem;
        color: var(--muted);
      }
      h1 {
        margin: 0 0 0.5rem;
        font-size: 1.25rem;
        letter-spacing: -0.02em;
      }
      p {
        margin: 0 0 1.25rem;
        color: var(--muted);
        font-size: 0.9375rem;
        line-height: 1.5;
      }
      .btn {
        display: inline-block;
        padding: 0.65rem 1.1rem;
        border-radius: 0.375rem;
        background: var(--accent);
        color: #fff;
        text-decoration: none;
        font-size: 0.9375rem;
        font-weight: 600;
      }
      .btn:focus-visible {
        outline: 2px solid var(--ink);
        outline-offset: 2px;
      }
    </style>
  </head>
  <body>
    <main class="panel">
      <svg class="icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <rect
          x="3"
          y="5"
          width="18"
          height="14"
          rx="2"
          stroke="currentColor"
          stroke-width="1.5"
        />
        <path d="M3 9h18" stroke="currentColor" stroke-width="1.5" />
      </svg>
      <h1>No projects yet</h1>
      <p>
        Create your first project to see activity here. Real empty copy only.
      </p>
      <a class="btn" href="#">Create project</a>
    </main>
  </body>
</html>
