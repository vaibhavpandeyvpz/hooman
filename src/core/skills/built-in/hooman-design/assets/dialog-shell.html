<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Dialog</title>
    <style>
      :root {
        --bg: #0f172a99;
        --ink: #0f172a;
        --muted: #64748b;
        --accent: #0f766e;
        --surface: #ffffff;
        --border: #e2e8f0;
        --danger: #b91c1c;
        --font-body: system-ui, -apple-system, sans-serif;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: var(--font-body);
        background: #f8fafc;
      }
      .backdrop {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 1.5rem;
        background: var(--bg);
      }
      [role="dialog"] {
        width: min(100%, 26rem);
        background: var(--surface);
        color: var(--ink);
        border: 1px solid var(--border);
        border-radius: 0.375rem;
        padding: 1.25rem 1.25rem 1rem;
        box-shadow: 0 12px 40px #0f172a22;
      }
      h1 {
        margin: 0 0 0.5rem;
        font-size: 1.125rem;
        letter-spacing: -0.02em;
      }
      p {
        margin: 0 0 1.25rem;
        color: var(--muted);
        font-size: 0.9375rem;
        line-height: 1.5;
      }
      .actions {
        display: flex;
        justify-content: flex-end;
        gap: 0.5rem;
      }
      .btn {
        padding: 0.55rem 0.9rem;
        border-radius: 0.375rem;
        border: 1px solid var(--border);
        background: transparent;
        font: inherit;
        font-weight: 600;
        cursor: pointer;
      }
      .btn-danger {
        background: var(--danger);
        border-color: var(--danger);
        color: #fff;
      }
      .btn:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 2px;
      }
    </style>
  </head>
  <body>
    <div class="backdrop">
      <div
        role="dialog"
        aria-modal="true"
        aria-labelledby="dlg-title"
        aria-describedby="dlg-desc"
      >
        <h1 id="dlg-title">Delete project?</h1>
        <p id="dlg-desc">
          This removes the project and its artifacts. This cannot be undone.
        </p>
        <div class="actions">
          <button class="btn" type="button">Cancel</button>
          <button class="btn btn-danger" type="button">Delete</button>
        </div>
      </div>
    </div>
  </body>
</html>
