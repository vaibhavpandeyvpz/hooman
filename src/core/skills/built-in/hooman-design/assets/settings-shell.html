<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Settings</title>
    <style>
      :root {
        --bg: #f8fafc;
        --ink: #0f172a;
        --muted: #64748b;
        --accent: #0f766e;
        --surface: #ffffff;
        --border: #e2e8f0;
        --font-body: system-ui, -apple-system, sans-serif;
        --space-3: 0.75rem;
        --space-4: 1rem;
        --space-5: 1.5rem;
        --space-6: 2rem;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: var(--font-body);
        background: var(--bg);
        color: var(--ink);
        font-size: 14px;
        line-height: 1.5;
      }
      .shell {
        display: grid;
        grid-template-columns: 14rem 1fr;
        min-height: 100vh;
      }
      @media (max-width: 720px) {
        .shell {
          grid-template-columns: 1fr;
        }
      }
      aside {
        border-right: 1px solid var(--border);
        background: var(--surface);
        padding: var(--space-5);
      }
      aside h1 {
        margin: 0 0 var(--space-4);
        font-size: 1rem;
      }
      aside nav {
        display: flex;
        flex-direction: column;
        gap: 0.25rem;
      }
      aside a {
        color: var(--muted);
        text-decoration: none;
        padding: 0.45rem 0.5rem;
        border-radius: 0.375rem;
        font-size: 0.875rem;
      }
      aside a[aria-current="page"] {
        background: var(--bg);
        color: var(--ink);
        font-weight: 600;
      }
      aside a:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 1px;
      }
      main {
        padding: var(--space-6);
        max-width: 40rem;
      }
      main h2 {
        margin: 0 0 0.25rem;
        font-size: 1.25rem;
        letter-spacing: -0.02em;
      }
      .desc {
        margin: 0 0 var(--space-5);
        color: var(--muted);
      }
      .panel {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 0.375rem;
        padding: var(--space-5);
        display: flex;
        flex-direction: column;
        gap: var(--space-4);
      }
      label {
        display: flex;
        flex-direction: column;
        gap: 0.35rem;
        font-weight: 600;
        font-size: 0.8125rem;
      }
      input,
      select {
        font: inherit;
        padding: 0.55rem 0.65rem;
        border: 1px solid var(--border);
        border-radius: 0.375rem;
      }
      input:focus-visible,
      select:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 1px;
      }
      .row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: var(--space-4);
      }
      .row p {
        margin: 0;
        color: var(--muted);
        font-weight: 400;
        font-size: 0.8125rem;
      }
      .actions {
        display: flex;
        gap: var(--space-3);
        margin-top: var(--space-3);
      }
      .btn {
        padding: 0.55rem 0.9rem;
        border-radius: 0.375rem;
        border: 0;
        background: var(--accent);
        color: #fff;
        font: inherit;
        font-weight: 600;
        cursor: pointer;
      }
      .btn-secondary {
        background: transparent;
        color: var(--ink);
        border: 1px solid var(--border);
      }
      .btn:focus-visible {
        outline: 2px solid var(--ink);
        outline-offset: 2px;
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <aside>
        <h1>Settings</h1>
        <nav aria-label="Settings">
          <a href="#" aria-current="page">General</a>
          <a href="#">Team</a>
          <a href="#">Billing</a>
        </nav>
      </aside>
      <main>
        <h2>General</h2>
        <p class="desc">Workspace identity and defaults.</p>
        <form class="panel">
          <label>
            Workspace name
            <input name="name" value="Acme" />
          </label>
          <label>
            Default timezone
            <select name="tz">
              <option>UTC</option>
              <option>America/New_York</option>
            </select>
          </label>
          <div class="row">
            <div>
              <strong style="font-size: 0.8125rem">Email notifications</strong>
              <p>Product updates and digests.</p>
            </div>
            <input
              type="checkbox"
              name="email"
              checked
              aria-label="Email notifications"
            />
          </div>
          <div class="actions">
            <button class="btn" type="submit">Save</button>
            <button class="btn btn-secondary" type="button">Cancel</button>
          </div>
        </form>
      </main>
    </div>
  </body>
</html>
