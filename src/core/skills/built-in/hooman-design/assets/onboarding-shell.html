<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Onboarding</title>
    <style>
      :root {
        --bg: #f7f5f2;
        --ink: #1a1a1a;
        --muted: #5c5c5c;
        --accent: #0f6b6b;
        --surface: #ffffff;
        --border: #e8e4dc;
        --font-body: system-ui, -apple-system, sans-serif;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: var(--font-body);
        background: var(--bg);
        color: var(--ink);
        display: grid;
        place-items: center;
        padding: 1.5rem;
      }
      .card {
        width: min(100%, 32rem);
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 0.375rem;
        padding: 1.75rem;
      }
      .steps {
        display: flex;
        gap: 0.5rem;
        margin-bottom: 1.25rem;
      }
      .steps span {
        flex: 1;
        height: 4px;
        border-radius: 999px;
        background: var(--border);
      }
      .steps span[aria-current="step"] {
        background: var(--accent);
      }
      .steps span[data-done="true"] {
        background: var(--accent);
        opacity: 0.45;
      }
      h1 {
        margin: 0 0 0.35rem;
        font-size: 1.35rem;
        letter-spacing: -0.02em;
      }
      .lede {
        margin: 0 0 1.25rem;
        color: var(--muted);
        font-size: 0.9375rem;
      }
      label {
        display: flex;
        flex-direction: column;
        gap: 0.35rem;
        font-size: 0.8125rem;
        font-weight: 600;
        margin-bottom: 1rem;
      }
      input {
        font: inherit;
        padding: 0.6rem 0.75rem;
        border: 1px solid var(--border);
        border-radius: 0.375rem;
      }
      input:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 1px;
      }
      .actions {
        display: flex;
        justify-content: space-between;
        gap: 0.75rem;
        margin-top: 0.5rem;
      }
      .btn {
        padding: 0.6rem 1rem;
        border-radius: 0.375rem;
        border: 0;
        background: var(--accent);
        color: #fff;
        font: inherit;
        font-weight: 600;
        cursor: pointer;
      }
      .btn-ghost {
        background: transparent;
        color: var(--ink);
        border: 1px solid var(--border);
      }
      .btn:focus-visible {
        outline: 2px solid var(--ink);
        outline-offset: 2px;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="steps" aria-label="Progress">
        <span data-done="true"></span>
        <span aria-current="step"></span>
        <span></span>
      </div>
      <h1>Name your workspace</h1>
      <p class="lede">Step 2 of 3 — keep copy concrete.</p>
      <form>
        <label>
          Workspace name
          <input name="name" placeholder="Acme" required />
        </label>
        <div class="actions">
          <button class="btn btn-ghost" type="button">Back</button>
          <button class="btn" type="submit">Continue</button>
        </div>
      </form>
    </main>
  </body>
</html>
