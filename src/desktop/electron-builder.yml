appId: com.vaibhavpandey.hooman.desktop
productName: Hooman
extraMetadata:
  main: dist/main/main.js
directories:
  output: src/desktop/release
files:
  - src/desktop/dist/**
  - package.json
extraResources:
  - from: src/desktop/resources/runtime
    to: runtime
mac:
  target:
    - target: dmg
      arch: [universal]
    - target: zip
      arch: [universal]
  category: public.app-category.developer-tools
  hardenedRuntime: true
  # Signing/notarization identity is intentionally not configured here — it
  # requires an Apple Developer ID and notarization credentials this
  # environment does not have. See plan Phase 7.
win:
  target:
    - target: nsis
      arch: [x64]
linux:
  target:
    - target: AppImage
      arch: [x64]
    - target: deb
      arch: [x64]
  category: Development
