name: CD

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  id-token: write
  contents: write

jobs:
  npm:
    name: Publish npm
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Update npm
        run: npm install --global npm@latest

      - name: Install dependencies
        run: npm ci --allow-remote=all

      - name: Build
        run: npm run build

      - name: Publish to npm
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  platform-bundles:
    name: Build ${{ matrix.target }} bundles
    runs-on: ${{ matrix.runner }}
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: darwin-arm64
            runner: macos-26
          - target: darwin-x64
            runner: macos-26-intel
          - target: linux-x64
            runner: ubuntu-latest
          - target: linux-arm64
            runner: ubuntu-24.04-arm
          - target: win32-x64
            runner: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Update npm
        run: npm install --global npm@latest

      - name: Build CLI
        run: |
          npm ci --allow-remote=all
          npm run typecheck
          npm run build

      - name: Install and verify VS Code extension
        working-directory: src/vscode
        run: |
          npm ci --allow-remote=all
          npm run typecheck
          npm run compile

      - name: Install production CLI dependencies
        run: |
          rm -rf node_modules
          npm ci --omit=dev --no-audit --no-fund --allow-remote=all

      - name: Prune MLX outside Apple Silicon
        if: matrix.target != 'darwin-arm64'
        run: rm -rf node_modules/mlex.js

      - name: Stage CLI in extension
        working-directory: src/vscode
        run: |
          npm run stage:cli
          test -f runtime/dist/cli.js
          test -f runtime/package.json

      - name: Package CLI tarball
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          mkdir -p dist-bundles
          tar -czf "dist-bundles/hoomanjs-cli-${VERSION}-${{ matrix.target }}.tar.gz" \
            dist node_modules package.json

      - name: Package platform-specific VSIX
        working-directory: src/vscode
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          mkdir -p dist-vsix
          VSIX="dist-vsix/hoomanjs-vscode-${VERSION}-${{ matrix.target }}.vsix"
          npx vsce package \
            --target "${{ matrix.target }}" \
            --no-dependencies \
            --out "$VSIX"
          test -f "$VSIX"
          unzip -l "$VSIX" > dist-vsix/contents.txt
          grep -q 'extension/runtime/dist/cli.js' dist-vsix/contents.txt
          grep -q 'extension/runtime/package.json' dist-vsix/contents.txt
          grep -q 'extension/runtime/node_modules/node-llama-cpp/' dist-vsix/contents.txt
          node runtime/dist/cli.js --help > /dev/null

      - name: Upload CLI bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: cli-bundle-${{ matrix.target }}
          path: dist-bundles/*.tar.gz
          if-no-files-found: error

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: vscode-${{ matrix.target }}
          path: src/vscode/dist-vsix/*.vsix
          if-no-files-found: error

  vscode:
    name: Publish VS Code extensions
    needs: platform-bundles
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Download all VSIX packages
        uses: actions/download-artifact@v4
        with:
          path: dist-vsix
          pattern: vscode-*
          merge-multiple: true

      - name: Verify platform package set
        run: |
          VERSION="$(node -p "require('./src/vscode/package.json').version")"
          for target in darwin-arm64 darwin-x64 linux-x64 linux-arm64 win32-x64; do
            test -f "dist-vsix/hoomanjs-vscode-${VERSION}-${target}.vsix"
          done

      - name: Publish to Visual Studio Marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          for vsix in dist-vsix/*.vsix; do
            npx --yes @vscode/vsce publish --packagePath "$vsix" --pat "$VSCE_PAT"
          done

  github-release:
    name: Create GitHub release
    needs: platform-bundles
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all CLI bundles
        uses: actions/download-artifact@v4
        with:
          path: dist-bundles
          pattern: cli-bundle-*
          merge-multiple: true

      - name: Compute checksums
        run: |
          cd dist-bundles
          for f in *.tar.gz; do
            sha256sum "$f" > "$f.sha256"
          done

      - name: Generate changelog since last tag
        run: |
          CURRENT="${GITHUB_REF_NAME}"
          PREVIOUS="$(git describe --tags --abbrev=0 "${CURRENT}^" 2>/dev/null || true)"
          {
            echo "## Changes"
            echo
            if [ -n "$PREVIOUS" ]; then
              echo "Commits since \`${PREVIOUS}\`:"
              echo
              git log "${PREVIOUS}..${CURRENT}" --no-merges --pretty=format:'- %s (%h)'
            else
              echo "Initial release."
              echo
              git log "${CURRENT}" --no-merges --pretty=format:'- %s (%h)'
            fi
            echo
          } > RELEASE_NOTES.md
          cat RELEASE_NOTES.md

      - name: Create GitHub release with bundles
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            dist-bundles/*.tar.gz \
            dist-bundles/*.sha256 \
            --title "${GITHUB_REF_NAME}" \
            --notes-file RELEASE_NOTES.md
